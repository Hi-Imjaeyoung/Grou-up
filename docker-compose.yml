version: '3.8' # 사용하시는 Docker Compose 버전에 맞게 조절

services:
  # 기존 Spring Boot 애플리케이션 서비스
  app:
    build: . # Dockerfile이 있는 경로
    container_name: my_spring_boot_app # (선택 사항) 컨테이너 이름 지정
    ports:
      - "8080:8080" # 호스트의 8080 포트를 컨테이너의 8080 포트로 연결
      - "9010:9010" # ✨ JMX 연결을 위한 포트 추가
    env_file:
      - .env # .env 파일 로드
    environment:
      # 컨테이너 메모리 제한보다 작게 설정해야 합니다.
      # 예: 컨테이너 메모리가 1GB일 때, 700-800MB 정도로 설정
      JAVA_OPTS: "-Xms512m -Xmx768m" # 최소 힙 512MB, 최대 힙 768MB 예시
    deploy: # 자원 제한 설정
      resources:
        limits:
          cpus: '1.0' # CPU 코어 1개 사용으로 제한 (t2.micro와 유사하게)
          # t3.micro(2 vCPU)와 유사하게 하려면 '2.0'으로 설정 가능
          memory: 1024M # 메모리를 1024MiB (1GiB)로 제한
        # reservations: # (선택 사항) 최소 보장 자원
        #   cpus: '0.5'
        #   memory: 512M

